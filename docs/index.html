<!doctype html>

<title>ゆいまーる商店｜沖縄特集 - がん共済アイリス会員様限定</title>
<style>
:root{
  --ocean:#0077b6;--ocean-d:#005f8a;--ocean-l:#90e0ef;

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;color:var(--ink);background:var(--cream);line-height:1.6;}
header{background:linear-gradient(135deg,#005f8a 0%,#0077b6 60%,#00b4d8 100%);color:#fff;padding:0;box-shadow:0 2px 12px rgba(0,80,130,.3);}
.header-inner{max-width:1320px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.logo{display:flex;flex-direction:column;gap:2px;}
.logo-main{font-size:22px;font-weight:900;letter-spacing:.04em;line-height:1.1;}

.hero{background:linear-gradient(135deg,#004d6e 0%,#0077b6 45%,#00b4d8 80%,#48cae4 100%);color:#fff;text-align:center;padding:52px 20px 44px;position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 40px);}
.hero-content{position:relative;z-index:1;}
.hero-tag{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:999px;padding:4px 16px;font-size:12px;font-weight:700;letter-spacing:.1em;margin-bottom:12px;}
.hero h1{font-size:clamp(28px,5vw,52px);font-weight:900;line-height:1.1;letter-spacing:-.01em;margin-bottom:10px;}
.hero h1 em{font-style:normal;color:#90e0ef;}
.hero-desc{font-size:15px;opacity:.88;max-width:560px;margin:0 auto 20px;line-height:1.7;}
.hero-stats{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.hero-stat{background:rgba(255,255,255,.15);border-radius:10px;padding:10px 20px;text-align:center;}
.hero-stat strong{display:block;font-size:22px;font-weight:900;}
.hero-stat span{font-size:11px;opacity:.8;}
.page-wrap{max-width:1320px;margin:0 auto;padding:28px 20px 60px;}
.controls-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
.search-box{flex:1;min-width:200px;max-width:380px;position:relative;}
.search-box input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 14px 9px 38px;font:inherit;font-size:14px;outline:none;background:#fff;transition:.15s;}
.search-box input:focus{border-color:var(--ocean);box-shadow:0 0 0 3px rgba(0,119,182,.12);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.sort-select{border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font:inherit;font-size:14px;background:#fff;cursor:pointer;outline:none;}
.sort-select:focus{border-color:var(--ocean);}
.clear-btn{border:1.5px solid var(--border);border-radius:8px;background:#fff;padding:9px 16px;font:inherit;font-size:13px;cursor:pointer;color:var(--muted);transition:.15s;}
.clear-btn:hover{border-color:var(--coral);color:var(--coral);}
.filters-section{margin-bottom:20px;}
.filter-group{margin-bottom:10px;}
.filter-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:7px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip label{cursor:pointer;}
.chip input{position:absolute;opacity:0;pointer-events:none;}
.chip span{display:inline-flex;align-items:center;height:30px;padding:0 12px;border:1.5px solid var(--border);border-radius:999px;background:#fff;font-size:12px;font-weight:600;color:var(--muted);transition:.15s;white-space:nowrap;cursor:pointer;}
.chip input:checked+span{background:var(--ocean);color:#fff;border-color:var(--ocean);box-shadow:0 3px 10px rgba(0,119,182,.22);}
.chip span:hover{border-color:var(--ocean);color:var(--ocean);}
.result-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.result-count{font-size:14px;color:var(--muted);}
.result-count strong{color:var(--ink);font-size:16px;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:.18s;cursor:pointer;border:1px solid transparent;display:flex;flex-direction:column;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,80,120,.16);border-color:rgba(0,119,182,.18);}
.card-img{aspect-ratio:1;background:#e8f4f8;position:relative;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:.2s;}
.card:hover .card-img img{transform:scale(1.04);}
.no-image{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#b0c8d0;gap:6px;}
.no-image svg{width:48px;height:48px;opacity:.5;}
.no-image-text{font-size:11px;font-weight:600;letter-spacing:.08em;opacity:.6;}
.card-badges{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;}
.badge-off{background:var(--coral);color:#fff;font-size:11px;font-weight:900;padding:2px 8px;border-radius:6px;line-height:1.5;}
.badge-free{background:var(--lime);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;line-height:1.5;}
.badge-cat{background:rgba(0,0,0,.55);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;line-height:1.5;}
.card-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:6px;}
.card-vendor{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;}
.card-name{font-size:13px;font-weight:700;line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-prices{margin-top:auto;padding-top:8px;}
.price-normal{font-size:11px;color:var(--muted);text-decoration:line-through;}
.price-sale{font-size:20px;font-weight:900;color:var(--coral);line-height:1.2;}
.price-sale small{font-size:13px;}
.price-label{font-size:10px;font-weight:700;color:var(--ocean);background:rgba(0,119,182,.08);border-radius:4px;padding:1px 5px;display:inline-block;margin-bottom:3px;}
.card-cta{margin-top:10px;width:100%;background:linear-gradient(135deg,var(--ocean) 0%,var(--ocean-d) 100%);color:#fff;border:none;border-radius:8px;padding:10px 0;font:inherit;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:.15s;}
.card-cta:hover{opacity:.85;}
.empty-state{text-align:center;padding:64px 20px;color:var(--muted);}
.empty-state svg{width:64px;height:64px;opacity:.3;margin-bottom:12px;display:block;margin:0 auto 12px;}
.empty-state p{font-size:16px;}
dialog{border:none;border-radius:16px;padding:0;width:min(900px,calc(100vw - 24px));max-height:90vh;overflow:hidden;box-shadow:0 30px 80px rgba(0,40,80,.28);}
dialog::backdrop{background:rgba(0,30,50,.6);}
.modal-layout{display:grid;grid-template-columns:1fr 1fr;max-height:90vh;overflow:hidden;}
.modal-imgs{background:#0a1628;position:relative;display:flex;flex-direction:column;}
.modal-main-img{width:100%;flex:1;object-fit:cover;display:block;min-height:0;}
.modal-thumbs{display:flex;gap:6px;padding:8px;overflow-x:auto;background:#0d1f35;flex-shrink:0;}
.modal-thumb{width:52px;height:52px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;opacity:.65;transition:.12s;flex-shrink:0;}
.modal-thumb.active,.modal-thumb:hover{opacity:1;border-color:#90e0ef;}
.no-img-modal{flex:1;display:flex;align-items:center;justify-content:center;color:#446;font-size:14px;}
.modal-info{padding:20px 22px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.modal-close-row{display:flex;justify-content:flex-end;flex-shrink:0;}
.modal-close{border:1.5px solid var(--border);border-radius:8px;background:#fff;padding:6px 14px;font:inherit;font-size:13px;cursor:pointer;color:var(--muted);}
.modal-close:hover{border-color:var(--coral);color:var(--coral);}
.modal-vendor{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.06em;}
.modal-name{font-size:17px;font-weight:900;line-height:1.4;}
.modal-prices{background:#fff8f0;border-radius:10px;padding:12px 14px;}
.modal-price-label{font-size:11px;color:var(--ocean);font-weight:700;letter-spacing:.06em;margin-bottom:4px;}
.modal-price-normal{font-size:13px;color:var(--muted);text-decoration:line-through;margin-bottom:2px;}
.modal-price-sale{font-size:26px;font-weight:900;color:var(--coral);}
.modal-price-sale small{font-size:15px;}
.modal-off{display:inline-block;background:var(--coral);color:#fff;font-size:13px;font-weight:900;padding:3px 10px;border-radius:7px;margin-left:8px;vertical-align:middle;}
.modal-badges{display:flex;gap:8px;flex-wrap:wrap;}
.badge-tag{display:inline-flex;align-items:center;height:26px;padding:0 10px;border-radius:999px;font-size:11px;font-weight:700;}
.badge-tag.free{background:#e6f5ec;color:#2d8540;}
.badge-tag.cat{background:#e8f4fb;color:#0066aa;}
.modal-desc{font-size:13px;line-height:1.75;color:#3a5560;white-space:pre-wrap;max-height:200px;overflow-y:auto;padding-right:4px;flex:1;}
.modal-desc::-webkit-scrollbar{width:4px;}
.modal-desc::-webkit-scrollbar-thumb{background:#c0d8e0;border-radius:2px;}
.modal-cta{width:100%;background:linear-gradient(135deg,var(--ocean),var(--ocean-d));color:#fff;border:none;border-radius:10px;padding:13px 0;font:inherit;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:.15s;margin-top:auto;flex-shrink:0;}
.modal-cta:hover{opacity:.88;}
footer{background:#0d2433;color:rgba(255,255,255,.6);text-align:center;padding:28px 20px;font-size:12px;line-height:1.9;}
footer strong{color:rgba(255,255,255,.9);}
@media(max-width:720px){

  .hero{padding:36px 16px 32px;}
  .products-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
  .card-name{font-size:12px;}
  .price-sale{font-size:17px;}
}
@media(max-width:480px){
  .header-inner{padding:10px 14px;}
  .logo-main{font-size:18px;}
  .member-badge{font-size:10px;padding:4px 10px;}
  .products-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
}
</style>
</head>

function buildChips(containerId, items, stateSet) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(v => '<label class="chip"><input type="checkbox" value="' + v.replace(/"/g,'&quot;') + '"><span>' + v + '</span></label>').join('');
  el.addEventListener('change', e => {
    if (!e.target.matches('input[type=checkbox]')) return;
    e.target.checked ? stateSet.add(e.target.value) : stateSet.delete(e.target.value);
    render();
  });
}

    if (state.vendors.size && !state.vendors.has(p.vendor)) return false;

    + '<div class="card-prices">'
    + '<div class="price-label">ゆいまーる会員価格</div>'
    + (p.normalPrice > p.salePrice ? '<div class="price-normal">通常 ' + yen(p.normalPrice) + '</div>' : '')
    + '<div class="price-sale"><small>¥</small>' + p.salePrice.toLocaleString('ja-JP') + '<small> 税込</small></div>'
    + '</div>'
    + '<button class="card-cta" data-code="' + p.code + '">詳細を見る</button>'
    + '</div></div>';
}

function render() {
  const list = filtered();
  resultNum.textContent = list.length;
  if (!list.length) { grid.innerHTML = ''; emptyState.style.display = 'block'; return; }
  emptyState.style.display = 'none';
  grid.innerHTML = list.map(cardHTML).join('');
}

let currentImgs = [], currentIdx = 0;

function openModal(code) {
  const p = PRODUCTS.find(x => x.code === code);
  if (!p) return;
  document.getElementById('modalVendor').textContent = p.vendor;
  document.getElementById('modalName').textContent = p.name;
  const normalEl = document.getElementById('modalNormal');
  normalEl.textContent = p.normalPrice > p.salePrice ? '通常価格 ' + yen(p.normalPrice) : '';
  document.getElementById('modalSale').innerHTML = '<small>¥</small>' + p.salePrice.toLocaleString('ja-JP') + '<small> 税込</small>';
  const offEl = document.getElementById('modalOff');
  offEl.textContent = p.offPct ? p.offPct + '% OFF' : '';
  offEl.style.display = p.offPct ? '' : 'none';
  const badges = document.getElementById('modalBadges');
  badges.innerHTML = (p.freeShipping ? '<span class="badge-tag free">送料無料</span>' : '')
    + '<span class="badge-tag cat">' + p.category + '</span>'
    + (p.limit ? '<span class="badge-tag cat">お一人様' + p.limit + '個まで</span>' : '');
  document.getElementById('modalDesc').textContent = p.desc || p.shortDesc || '商品説明を準備中です。';
  currentImgs = p.images || []; currentIdx = 0;
  renderModalImgs();
  modal.showModal();
}

function renderModalImgs() {
  const el = document.getElementById('modalImgs');
  if (!currentImgs.length) { el.innerHTML = '<div class="no-img-modal">画像なし</div>'; return; }
  const mainSrc = 'images/' + currentImgs[currentIdx];
  const thumbs = currentImgs.map((img, i) =>
    '<img src="images/' + img + '" class="modal-thumb' + (i===currentIdx?' active':'') + '" data-idx="' + i + '" alt="画像' + (i+1) + '" loading="lazy">'
  ).join('');
  el.innerHTML = '<img src="' + mainSrc + '" class="modal-main-img" id="modalMainImg" alt="メイン画像"><div class="modal-thumbs">' + thumbs + '</div>';
  el.querySelectorAll('.modal-thumb').forEach(t => {
    t.addEventListener('click', () => { currentIdx = Number(t.dataset.idx); renderModalImgs(); });
  });
}

grid.addEventListener('click', e => {
  const btn = e.target.closest('[data-code]');
  if (btn) openModal(btn.dataset.code);
});
document.getElementById('modalClose').addEventListener('click', () => modal.close());
modal.addEventListener('click', e => { if (e.target === modal) modal.close(); });
document.getElementById('searchInput').addEventListener('input', e => { state.q = e.target.value.trim(); render(); });
document.getElementById('sortSelect').addEventListener('change', e => { state.sort = e.target.value; render(); });
document.getElementById('clearBtn').addEventListener('click', () => {
  state.q = ''; state.cats.clear(); state.vendors.clear(); state.sort = 'default';
  document.getElementById('searchInput').value = '';
  document.getElementById('sortSelect').value = 'default';
  document.querySelectorAll('.chip input').forEach(c => c.checked = false);
  render();
});
render();
</script>
</body>
</html>
